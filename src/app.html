<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="William George — software engineer and U-M graduate. Portfolio, projects, and contact."
		/>
		<meta name="author" content="William George" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafafa" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/img/dino.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/img/dino.png" />
		<script>
			try {
				if (localStorage.getItem('theme') === 'dark') {
					document.documentElement.classList.add('dark');
				}
			} catch {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
