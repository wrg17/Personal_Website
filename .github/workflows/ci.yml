name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run check

      - run: npm run test

      - run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

      - run: npm run test:links

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify production deploy
        env:
          NETLIFY_PROD_BUILD_HOOK: ${{ secrets.NETLIFY_PROD_BUILD_HOOK }}
        run: |
          if [ -z "$NETLIFY_PROD_BUILD_HOOK" ]; then
            echo "::error::NETLIFY_PROD_BUILD_HOOK secret is not set; cannot trigger Netlify deploy."
            exit 1
          fi
          curl -fsSL -X POST -d '{}' "$NETLIFY_PROD_BUILD_HOOK"
